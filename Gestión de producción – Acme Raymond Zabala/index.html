<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ACME - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0f172a;">
    <div class="card" style="width:100%; max-width:380px;">
        <h2 style="text-align:center; margin-bottom:15px;">ACME Macondo</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Número de Identificación</label>
                <input type="text" id="loginId" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPass" required>
            </div>
            <button type="submit" class="btn" style="width:100%;">Ingresar</button>
        </form>
    </div>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
